<html lang="en">
<head>
<meta charset="utf-8"/>
<style>
  html, body, #map { margin:0; padding:0; width:100%; height:100%; }
  #search-box {
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    z-index:1000; display:flex; gap:4px;
  }
  #search-box input {
    width:220px; padding:5px 8px; border-radius:4px;
    border:1px solid #aaa; font-size:13px;
  }
  #search-box button {
    padding:5px 10px; border-radius:4px; border:none;
    background:#3a7bd5; color:white; cursor:pointer; font-size:13px;
  }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <title> Map </title>
</head>
<body>
<div id="search-box">
  <input id="query" type="text" placeholder="Search location..."/>
  <button onclick="searchLocation()">Go</button>
</div>
<div id="map"></div>
<script>
var map = L.map('map').setView([3.2206334, 101.9676587], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

var marker = null;
var bridge = null;

new QWebChannel(qt.webChannelTransport, function(channel) {
  bridge = channel.objects.bridge;
});

map.on('click', function(e) {
  placePin(e.latlng.lat, e.latlng.lng);
});

function placePin(lat, lon) {
  if (marker) marker.remove();
  marker = L.marker([lat, lon]).addTo(map);
  if (bridge) bridge.pin_placed(lat, lon);
}

function searchLocation() {
  var q = document.getElementById('query').value.trim();
  if (!q) return;
  fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + encodeURIComponent(q))
    .then(r => r.json())
    .then(results => {
      if (results.length === 0) { alert('Location not found'); return; }
      var lat = parseFloat(results[0].lat);
      var lon = parseFloat(results[0].lon);
      map.setView([lat, lon], 15);
      placePin(lat, lon);
    });
}

document.getElementById('query').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchLocation();
});
</script>
</body>
</html>
